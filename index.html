---
layout: default
title: GW2 Raid Tracker
---

<!-- Loading state -->
<div id="loading-state" class="loading-state">
  <div class="loading-sigil">⚔</div>
  <p class="loading-text">Fetching raid data from the API…</p>
</div>

<!-- Error state -->
<div id="error-state" class="error-state" style="display:none">
  <p class="error-text">⚠️ Failed to fetch raid data. Check your API tokens or try again.</p>
</div>

<!-- Main content (populated by tracker.js) -->
<div id="main-content" style="display:none">

  <section class="summary-section">
    <h2 class="section-heading">Weekly Summary</h2>
    <div class="summary-grid">

      <div class="summary-card card-main">
        <div class="account-label">🟦 Main</div>
        <div class="stat-row"><span class="stat-label">Cleared</span><span class="stat-val cleared" id="main-cleared">—</span></div>
        <div class="stat-row"><span class="stat-label">Remaining</span><span class="stat-val remaining" id="main-remaining">—</span></div>
        <div class="progress-bar"><div class="progress-fill" id="main-bar" style="width:0%"></div></div>
        <div class="progress-label" id="main-pct">—</div>
      </div>

      <div class="summary-card card-both">
        <div class="account-label">🤝 Both Accounts</div>
        <div class="stat-row"><span class="stat-label">Shared Clears</span><span class="stat-val cleared" id="both-cleared">—</span></div>
        <div class="stat-row"><span class="stat-label">Total Bosses</span><span class="stat-val" id="total-bosses">—</span></div>
        <div class="progress-bar"><div class="progress-fill fill-gold" id="both-bar" style="width:0%"></div></div>
        <div class="progress-label" id="both-pct">—</div>
      </div>

      <div class="summary-card card-alt">
        <div class="account-label">🟧 Alt</div>
        <div class="stat-row"><span class="stat-label">Cleared</span><span class="stat-val cleared" id="alt-cleared">—</span></div>
        <div class="stat-row"><span class="stat-label">Remaining</span><span class="stat-val remaining" id="alt-remaining">—</span></div>
        <div class="progress-bar"><div class="progress-fill fill-alt" id="alt-bar" style="width:0%"></div></div>
        <div class="progress-label" id="alt-pct">—</div>
      </div>

    </div>
  </section>

  <section class="wings-section">
    <h2 class="section-heading">Wing Breakdown</h2>
    <div id="wings-container"></div>
  </section>

</div>

<script src="{{ '/assets/js/tracker.js' | relative_url }}"></script>
