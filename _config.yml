# ============================================================
#  Beautiful-Jekyll — _config.yml
#  GW2 Raid Tracker
#  Navbar and footer are suppressed via _includes overrides.
# ============================================================


# ── Theme ────────────────────────────────────────────────────────────────────
remote_theme: daattali/beautiful-jekyll@6.0.1

plugins:
  - jekyll-remote-theme
  - jekyll-sitemap
  - jekyll-feed


# ── Site identity ─────────────────────────────────────────────────────────────
title: GW2 Raid Tracker
description: Weekly raid completion tracker for Guild Wars 2 accounts.

# Replace YOURUSERNAME with your actual GitHub username.
# User site  (repo named YOURUSERNAME.github.io) → https://YOURUSERNAME.github.io
# Project site (any other repo name)              → https://YOURUSERNAME.github.io
url: "https://bghngao.github.io"

# Leave empty ("") for user/org sites.
# Set to "/repo-name" for project sites, e.g.: /gw2-raids
baseurl: ""


# ── Colours ───────────────────────────────────────────────────────────────────
# These apply to the minimal layout's <head> chrome only (meta theme-color etc.)
# The raids.html page overrides body/page colours with its own CSS variables.
page-col:  "#0c0e14"
link-col:  "#c8a84b"
hover-col: "#f0cc70"


# ── Page defaults ─────────────────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "minimal"     # minimal = no navbar, no footer chrome from the theme
      comments: false
      social-share: false
      show-avatar: false
  - scope:
      path: "raids.html"
    values:
      layout: "minimal"
      full-width: true
      comments: false
      social-share: false
      show-avatar: false


# ── Markdown & build ─────────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty


# ── Exclusions ───────────────────────────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - "*.sh"
