# ============================================================
#  Beautiful-Jekyll — _config.yml
#  Compatible with raids.html (GW2 Raid Tracker page)
#  https://github.com/daattali/beautiful-jekyll
# ============================================================


# ── Theme ────────────────────────────────────────────────────────────────────
remote_theme: daattali/beautiful-jekyll@6.0.1

plugins:
  - jekyll-remote-theme
  - jekyll-sitemap
  - jekyll-feed


# ── Site identity ─────────────────────────────────────────────────────────────
title: GW2 Raid Tracker
rss-description: Weekly raid completion tracker for Guild Wars 2 accounts.

# Replace with your actual GitHub Pages URL.
# User site  → https://YOURUSERNAME.github.io
# Project site → https://YOURUSERNAME.github.io/REPONAME
url: "https://YOURUSERNAME.github.io"

# Leave empty ("") for user/org sites.
# For project sites set to the repo name, e.g.: /gw2-raids
baseurl: ""


# ── Author ────────────────────────────────────────────────────────────────────
author:
  name: Your Name


# ── Navbar ───────────────────────────────────────────────────────────────────
navbar-links:
  Raid Tracker: "raids"
  GW2 Wiki: "https://wiki.guildwars2.com/wiki/Raid"
  API Reference: "https://api.guildwars2.com/v2/raids"

nav-short: false
navbar-var-length: true


# ── Colours ───────────────────────────────────────────────────────────────────
navbar-col:        "#0c0e14"
navbar-text-col:   "#d8dae8"
navbar-border-col: "#2a2f45"
navbar-hover-col:  "#c8a84b"

page-col:          "#0c0e14"
link-col:          "#c8a84b"
hover-col:         "#f0cc70"

footer-col:        "#0c0e14"
footer-text-col:   "#4a5070"
footer-link-col:   "#8a6f2e"
footer-hover-col:  "#c8a84b"


# ── Footer social links ───────────────────────────────────────────────────────
social-network-links:
  github: YOURUSERNAME


# ── Page defaults ─────────────────────────────────────────────────────────────
# Both scopes are items in the SAME defaults list — only one `defaults:` key.
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      comments: false
      social-share: false
      show-avatar: false
  - scope:
      path: "raids.html"
    values:
      full-width: true
      comments: false
      social-share: false
      show-avatar: false


# ── Markdown & build ─────────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty


# ── Exclusions ───────────────────────────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - "*.sh"
